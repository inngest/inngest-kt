name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test (Java ${{ matrix.java }}, Spring Boot ${{ matrix.spring-boot }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ["8", "11", "17", "21", "25"]
        spring-boot: ["2.7.18", "3.5.14", "4.0.6"]
        exclude:
          - java: "8"
            spring-boot: "3.5.14"
          - java: "8"
            spring-boot: "4.0.6"
          - java: "11"
            spring-boot: "3.5.14"
          - java: "11"
            spring-boot: "4.0.6"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          java-package: jdk
          cache: gradle
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          java-package: jdk

      - name: Test
        run: JAVA_HOME="${JAVA_HOME_21_X64}" PATH="${JAVA_HOME_21_X64}/bin:${PATH}" make test SPRING_BOOT_VERSION=${{ matrix.spring-boot }} TEST_JAVA_VERSION=${{ matrix.java }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ktlint
        uses: ScaCap/action-ktlint@master
        with:
          fail_on_error: true
          github_token: ${{ secrets.github_token }}
          # NOTE: lock until this is resolved
          # https://github.com/ScaCap/action-ktlint/issues/48
          ktlint_version: "1.8.0"
          reporter: github-pr-review

  itest:
    name: Integration Test (Java ${{ matrix.java }}, Spring Boot ${{ matrix.spring-boot }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ["8", "11", "17", "21", "25"]
        spring-boot: ["2.7.18", "3.5.14", "4.0.6"]
        exclude:
          - java: "8"
            spring-boot: "3.5.14"
          - java: "8"
            spring-boot: "4.0.6"
          - java: "11"
            spring-boot: "3.5.14"
          - java: "11"
            spring-boot: "4.0.6"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          java-package: jdk
          cache: gradle
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          java-package: jdk
      - uses: DeterminateSystems/nix-installer-action@v22
      - name: Initialize Nix dev shell
        run: nix develop -c true

      - name: Test
        run: JAVA_HOME="${JAVA_HOME_21_X64}" PATH="${JAVA_HOME_21_X64}/bin:${PATH}" nix develop -c make itest SPRING_BOOT_VERSION=${{ matrix.spring-boot }} TEST_JAVA_VERSION=${{ matrix.java }}
